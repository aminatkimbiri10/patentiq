# n8n local — proxy OMPIC pour PatentIQ
# Usage: docker compose -f docker-compose.n8n.yml up -d

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - OMPIC_PROXY_TOKEN=patentiq-ompic-n8n-2026-xK9mQ2
      - GENERIC_TIMEZONE=Africa/Casablanca
      - TZ=Africa/Casablanca
      - WEBHOOK_URL=http://localhost:5678/
      # Autorise $env.OMPIC_PROXY_TOKEN dans le node Code (n8n 2.x)
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
